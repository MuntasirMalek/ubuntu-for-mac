# ============================================================
# Apple GMUX — GPU switching configuration
# ============================================================
# MacBooks with dual GPUs (Intel integrated + AMD/NVIDIA
# discrete) use apple-gmux to switch between them.
#
# By default, we force the integrated GPU (IGD) to save
# power and reduce heat. Users who need the discrete GPU
# for graphics work can comment out this line.
# ============================================================

# Force integrated GPU by default (saves battery, less heat)
options apple_gmux force_igd=y

