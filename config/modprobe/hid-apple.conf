# ============================================================
# Apple Keyboard (hid-apple) — Function key & key mapping
# ============================================================
# By default, Mac function keys act as media keys (brightness,
# volume, etc). This config makes F1-F12 the default, with
# media functions accessible by holding Fn.
#
# Options:
#   fnmode=0  — Fn key disabled
#   fnmode=1  — F1-F12 require Fn (Mac default)
#   fnmode=2  — F1-F12 are default (Linux-friendly)
#
#   swap_opt_cmd=0 — keep Option=Alt, Command=Super (default)
#   swap_opt_cmd=1 — swap Option and Command keys
#
#   swap_fn_leftctrl=0 — normal (default)
#   swap_fn_leftctrl=1 — swap Fn and left Ctrl
# ============================================================

# F1-F12 keys act as function keys by default
options hid_apple fnmode=2

# Keep standard key mapping (change to 1 if you want to swap)
options hid_apple swap_opt_cmd=0
options hid_apple swap_fn_leftctrl=0
