# ============================================================
# Apple NVMe & Suspend/Resume fixes
# ============================================================
# Apple's custom NVMe controller can cause issues with
# suspend/resume on Linux. These kernel parameters help.
#
# Also sets power management hints for better battery life
# and prevents the NVMe controller from entering a state
# it can't wake from.
# ============================================================

# Prevent NVMe suspend issues on Apple hardware
options nvme_core default_ps_max_latency_us=0
