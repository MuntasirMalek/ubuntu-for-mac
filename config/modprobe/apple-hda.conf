# ============================================================
# Apple HDA — Intel audio fix for MacBooks
# ============================================================
# MacBooks use Cirrus Logic audio codecs connected via
# Intel HDA. The default auto-detection sometimes picks
# the wrong model, causing no sound or crackling.
#
# This sets a model hint that works for most MacBook Pros.
# If audio doesn't work, try other model values:
#   mbp101, mbp55, mbp71, mbp11, intel-mac-auto
# ============================================================

options snd-hda-intel model=mbp101
options snd-hda-intel probe_mask=1

