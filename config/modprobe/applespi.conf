# ============================================================
# Apple SPI — Keyboard/Trackpad for 2016-2017 MacBooks
# ============================================================
# MacBook Pro 2016-2017 (non-T2) and 12" MacBook 2015-2017
# use Apple SPI for internal keyboard and trackpad instead
# of USB. These modules must be loaded for input to work.
#
# The applespi driver was merged into mainline kernel ~5.17,
# so Ubuntu 24.04+ should have it built-in. This config
# ensures the required platform modules are also loaded.
# ============================================================

# SPI platform support (required for applespi)
# These are loaded automatically via initramfs, but we
# ensure they're not blacklisted
softdep applespi pre: spi_pxa2xx_platform intel_lpss_pci
