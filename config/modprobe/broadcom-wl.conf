# ============================================================
# Broadcom WiFi driver configuration
# ============================================================
# The proprietary 'wl' driver (broadcom-sta) conflicts with
# several open-source Broadcom drivers. We must blacklist
# them to prevent kernel module conflicts that cause WiFi
# failures, system freezes, or intermittent connectivity.
# ============================================================

# Blacklist open-source drivers that conflict with wl
blacklist b43
blacklist b43legacy
blacklist ssb
blacklist bcma
blacklist brcmsmac
blacklist brcmfmac
blacklist brcmutil
blacklist bcm43xx

# Note: The 'wl' module from broadcom-sta-dkms will be
# loaded automatically. If it doesn't, run:
#   sudo modprobe wl

