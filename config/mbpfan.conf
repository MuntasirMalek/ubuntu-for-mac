# ============================================================
# mbpfan — MacBook Fan Control Configuration
# ============================================================
# mbpfan reads temperature data from coretemp/applesmc and
# adjusts fan speed accordingly. These values are tuned for
# a good balance between noise and cooling on MacBooks.
#
# Temperature values are in Celsius.
# Fan speed values are in RPM.
# ============================================================

[general]
# Minimum fan speed (RPM) — keeps things quiet during light work
min_fan1_speed = 2000

# Maximum fan speed (RPM) — full blast for heavy loads
max_fan1_speed = 6200

# Temperature at which fan starts ramping up
low_temp = 55

# Temperature at which fan reaches max speed
high_temp = 80

# Critical temperature — emergency max fan
max_temp = 86

# Polling interval in seconds
polling_interval = 1

